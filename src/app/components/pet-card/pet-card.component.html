@let a = alert();
<article
  class="group relative flex flex-col h-full bg-surface-container-lowest rounded-2xl overflow-hidden ring-1 ring-on-surface/[0.06] shadow-card transition-all duration-300 hover:-translate-y-1 hover:shadow-card-hover"
>
  <a
    [routerLink]="['/alertas', a.id]"
    class="relative aspect-[4/3] overflow-hidden bg-surface-container-high block no-underline text-inherit cursor-pointer outline-none focus-visible:ring-2 focus-visible:ring-inset focus-visible:ring-primary/50"
    [attr.aria-label]="'View details for ' + a.name"
  >
    <img
      class="w-full h-full object-cover transition-transform duration-700 ease-out group-hover:scale-[1.04]"
      [src]="a.imageUrl"
      [alt]="a.imageAlt"
      loading="lazy"
    />
    <div class="absolute inset-0 bg-gradient-to-t from-on-surface/25 via-transparent to-transparent opacity-60 pointer-events-none"></div>
    @if (a.status === 'Lost') {
      <div
        class="absolute top-4 left-4 rounded-full bg-[#c45c26] text-white px-3.5 py-1.5 font-headline text-[10px] font-extrabold uppercase tracking-[0.2em] shadow-soft pointer-events-none"
      >
        Lost pet
      </div>
    } @else {
      <div
        class="absolute top-4 left-4 rounded-full bg-secondary text-on-secondary px-3.5 py-1.5 font-headline text-[10px] font-extrabold uppercase tracking-[0.2em] shadow-soft pointer-events-none"
      >
        Sighted pet
      </div>
    }
  </a>
  <div class="flex flex-col flex-1 p-6 md:p-7">
    <div class="flex justify-between items-start gap-3 mb-3">
      <h3 class="font-headline text-2xl md:text-[1.65rem] font-extrabold text-primary tracking-tight leading-tight">
        {{ a.name }}
      </h3>
      @if (a.breedVariant === 'tertiary') {
        <span
          class="text-[11px] font-bold text-tertiary bg-tertiary-fixed/90 px-2.5 py-1 rounded-lg shrink-0 tracking-wide"
        >
          {{ a.breed }}
        </span>
      } @else {
        <span
          class="text-[11px] font-bold text-secondary bg-secondary-fixed/90 px-2.5 py-1 rounded-lg shrink-0 tracking-wide"
        >
          {{ a.breed }}
        </span>
      }
    </div>
    <div class="flex items-start gap-2 text-on-surface-variant text-sm mb-4 font-medium">
      <span class="material-symbols-outlined text-base text-primary/70 mt-0.5">location_on</span>
      <span class="leading-snug">{{ a.location }}</span>
    </div>
    <p class="text-on-surface-variant/95 text-sm line-clamp-2 leading-relaxed flex-1 font-body">
      {{ a.description }}
    </p>
    <div
      class="mt-6 pt-5 border-t border-outline-variant/20 flex justify-between items-center gap-3 text-[11px] font-bold text-outline uppercase tracking-wide"
    >
      <span>{{ a.reportedAgo }}</span>
      <a
        class="text-primary text-sm font-extrabold tracking-wide hover:text-primary-container transition-colors inline-flex items-center gap-1 group/link"
        [routerLink]="['/alertas', a.id]"
      >
        View details
        <span
          class="material-symbols-outlined text-base transition-transform group-hover/link:translate-x-0.5"
          aria-hidden="true"
          >chevron_right</span>
      </a>
    </div>
  </div>
</article>
