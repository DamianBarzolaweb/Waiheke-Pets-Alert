<nav
  class="fixed top-0 w-full z-50 bg-surface/85 dark:bg-slate-950/80 backdrop-blur-xl shadow-soft ring-1 ring-on-surface/[0.04] dark:shadow-none dark:ring-0"
>
  <div class="flex justify-between items-center px-6 py-4 max-w-screen-2xl mx-auto gap-4">
    <a routerLink="/" class="text-xl font-bold tracking-tighter text-primary dark:text-cyan-100 font-headline shrink-0">
      Waiheke Pets Alert
    </a>
    <div class="hidden md:flex items-center gap-6 lg:gap-8 flex-wrap justify-end">
      <a
        routerLink="/"
        routerLinkActive="text-primary border-b-2 border-primary"
        [routerLinkActiveOptions]="{ paths: 'exact', queryParams: 'ignored', matrixParams: 'ignored', fragment: 'ignored' }"
        class="inline-flex items-center text-on-surface/60 dark:text-slate-400 hover:bg-surface-container-low dark:hover:bg-slate-800 transition-colors duration-200 font-headline uppercase tracking-widest font-bold text-xs py-1 border-b-2 border-transparent"
      >
        Home
      </a>
      <a
        routerLink="/how-it-works"
        routerLinkActive="text-primary border-b-2 border-primary"
        class="inline-flex items-center text-on-surface/60 dark:text-slate-400 hover:bg-surface-container-low dark:hover:bg-slate-800 transition-colors duration-200 font-headline uppercase tracking-widest font-bold text-xs py-1 border-b-2 border-transparent"
      >
        How it works
      </a>
      <a
        routerLink="/recursos"
        routerLinkActive="text-primary border-b-2 border-primary"
        class="inline-flex items-center text-on-surface/60 dark:text-slate-400 hover:bg-surface-container-low dark:hover:bg-slate-800 transition-colors duration-200 font-headline uppercase tracking-widest font-bold text-xs py-1 border-b-2 border-transparent"
      >
        Island resources
      </a>
    </div>
    <div class="flex items-center gap-2 sm:gap-3 shrink-0 flex-wrap justify-end">
      @if (auth.isLoggedIn()) {
        <div class="relative">
          <button
            type="button"
            (click)="toggleMenu()"
            class="inline-flex items-center gap-1.5 rounded-full bg-surface-container-high pl-3 pr-2 py-2 text-sm font-bold text-on-surface ring-1 ring-on-surface/[0.08] hover:bg-surface-container-highest transition max-w-[11rem] sm:max-w-[14rem]"
            [attr.aria-expanded]="menuOpen()"
            aria-haspopup="true"
          >
            <span class="truncate" [title]="auth.displayName()">{{ auth.displayName() }}</span>
            <span class="material-symbols-outlined text-lg text-on-surface/60 shrink-0" aria-hidden="true">
              expand_more
            </span>
          </button>
          @if (menuOpen()) {
            <div
              class="absolute right-0 top-full mt-2 min-w-[12rem] rounded-2xl bg-surface-container-lowest py-2 shadow-card ring-1 ring-on-surface/[0.08] z-50"
              role="menu"
            >
              <a
                routerLink="/settings"
                (click)="closeMenu()"
                class="block px-4 py-2.5 text-sm font-semibold text-on-surface hover:bg-surface-container-high transition"
                role="menuitem"
              >
                Account settings
              </a>
              @if (auth.isAdmin()) {
                <a
                  routerLink="/admin"
                  (click)="closeMenu()"
                  class="block px-4 py-2.5 text-sm font-semibold text-secondary hover:bg-surface-container-high transition"
                  role="menuitem"
                >
                  Admin panel
                </a>
              }
              <button
                type="button"
                (click)="logout()"
                class="w-full text-left px-4 py-2.5 text-sm font-semibold text-on-surface/70 hover:bg-surface-container-high hover:text-error transition"
                role="menuitem"
              >
                Log out
              </button>
            </div>
          }
        </div>
      } @else {
        <a
          routerLink="/login"
          class="text-[10px] sm:text-xs font-extrabold uppercase tracking-widest text-on-surface/70 hover:text-primary px-2 py-1"
        >
          Login
        </a>
        <a
          routerLink="/registro"
          class="text-[10px] sm:text-xs font-extrabold uppercase tracking-widest text-primary hover:underline px-2 py-1"
        >
          Sign up
        </a>
      }
      <a
        routerLink="/reportar"
        class="bg-gradient-to-br from-primary to-primary-container text-on-primary px-4 sm:px-6 py-2 rounded-full font-headline font-bold text-[10px] sm:text-xs uppercase tracking-widest active:scale-95 transition-transform text-center whitespace-nowrap"
      >
        Report Pet
      </a>
    </div>
  </div>
</nav>
