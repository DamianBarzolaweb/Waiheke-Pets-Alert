<div class="flex flex-col gap-6 pb-6">
  <header>
    <p class="font-headline text-xs font-bold uppercase tracking-[0.35em] text-secondary mb-3">Live map</p>
    <h1 class="font-headline text-3xl sm:text-4xl font-extrabold text-primary tracking-tight mb-3">Alerts on the island</h1>
    <p class="text-on-surface-variant leading-relaxed max-w-2xl">
      OpenStreetMap tiles — pan, zoom, and tap a pin to open the full report. Pins are approximate areas, not exact GPS fixes.
    </p>
  </header>

  <div
    class="rounded-2xl overflow-hidden ring-1 ring-on-surface/[0.06] shadow-soft min-h-[min(65vh,560px)] h-[min(65vh,560px)] w-full"
  >
    <app-leaflet-map [markers]="markers()" [zoom]="13" />
  </div>

  <p class="text-center">
    <a
      routerLink="/"
      class="inline-flex items-center gap-1 text-sm font-extrabold text-primary uppercase tracking-widest hover:text-primary-container transition"
    >
      <span class="material-symbols-outlined text-lg" aria-hidden="true">arrow_back</span>
      Back to list
    </a>
  </p>
</div>
